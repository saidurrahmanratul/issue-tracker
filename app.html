<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <a class="nav-brand" href="#">
        <img src="github-logo.png" alt="GitHub" />
        GitHub Issues Tracker
      </a>
      <div class="nav-right">
        <div class="search-box">
          <svg
            width="14"
            height="14"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input type="text" id="searchInput" placeholder="Search issues..." />
        </div>
        <button class="btn-new" id="newIssueBtn">+ New Issue</button>
        <button class="btn-logout" id="logoutBtn">Sign Out</button>
      </div>
    </nav>

    <div class="main">
      <div class="tabs">
        <button class="tab active" data-status="all">All</button>
        <button class="tab" data-status="open">Open</button>
        <button class="tab" data-status="closed">Closed</button>
      </div>

      <div class="summary-bar">
        <div class="summary-left">
          <div class="summary-icon">🔮</div>
          <div>
            <h2><span id="issueCount">0</span> Issues</h2>
            <p>Track and manage your project issues</p>
          </div>
        </div>
        <div class="summary-right">
          <span class="legend"><span class="dot open"></span> Open</span>
          <span class="legend"><span class="dot closed"></span> Closed</span>
        </div>
      </div>

      <div id="issuesContainer" class="grid"></div>
    </div>

    <div id="modal" class="modal-overlay hidden">
      <div class="modal-box">
        <div id="modalBody"></div>
        <button class="modal-close" id="closeModal">Close</button>
      </div>
    </div>
  </body>
</html>
